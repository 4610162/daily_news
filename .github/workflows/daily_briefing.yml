name: Daily Economic Briefing

on:
  schedule:
    # 매일 한국 시간 오전 7시 (UTC 22시) 실행
    - cron: '0 22 * * *'
  workflow_dispatch:

# MkDocs 배포를 위해 필수적인 권한 설정
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: python main.py
      
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. 모든 변경사항(새 리포트, 수정된 mkdocs.yml 등)을 하나도 빠짐없이 스테이징합니다.
        git add .
        
        # 2. 커밋할 내용이 있는지 확인 후 커밋
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Update daily report and mkdocs nav $(date +'%Y-%m-%d')"
          
          # 3. 중요: pull rebase 전에 다시 한번 상태를 체크하거나 강제로 병합합니다.
          # -X theirs는 충돌 시 서버(Action이 만든 것)의 내용을 우선시합니다.
          git pull origin master --rebase -X theirs
          
          # 4. 푸시
          git push origin master
        else
          echo "No changes to commit"
        fi

    # 마지막 배포 단계: MkDocs 전용 명령어로 변경
    - name: Build and Deploy MkDocs
      run: |
        # main.py 안에서도 배포를 하지만, 여기서 한 번 더 확실하게 해줍니다.
        # mkdocs-material 등 테마가 정상 설치되었다면 바로 작동합니다.
        mkdocs gh-deploy --force