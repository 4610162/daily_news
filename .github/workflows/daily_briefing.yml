name: Daily Economic Briefing

on:
  schedule:
    # 매일 한국 시간 오전 7시 (UTC 22시) 실행
    - cron: '0 22 * * *'
  workflow_dispatch:

# 아래 권한 설정이 있어야 Zensical이 페이지를 배포할 수 있습니다.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # 전체 히스토리를 가져와야 push 충돌이 적습니다.

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: python main.py
      
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. 변경된 파일(리포트 및 zensical.toml)을 먼저 스테이징합니다.
        git add docs/ zensical.toml
        
        # 2. 커밋할 변경사항이 있는지 확인합니다.
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Update daily report and nav $(date +'%Y-%m-%d')"
          
          # 3. 커밋 후에 원격 저장소의 최신 내용을 가져와 합칩니다.
          # rebase 전략을 사용하며, 충돌 시 원격 내용을 우선하도록 설정하여 자동화 에러를 방지합니다.
          git pull origin master --rebase -X theirs
          
          # 4. 최종적으로 푸시합니다.
          git push origin master
        else
          echo "No changes to commit"
        fi
        
# 마지막에 배포를 진행합니다.
    - name: Build and Deploy Zensical
      run: |
        # 1. zensical이 설치된 정확한 위치를 파이썬에게 물어봅니다.
        BIN_PATH=$(python -c "import site; print(site.getuserbase())")/bin/zensical
        
        # 2. 그 위치에 파일이 있는지 확인하고 있으면 바로 실행합니다.
        if [ -f "$BIN_PATH" ]; then
          $BIN_PATH deploy --force
        else
          # 혹시 위 경로가 아니면 시스템 전역 경로에서 시도합니다.
          python3 -m pip install zensical  # 다시 한번 확실히 설치 확인
          zensical deploy --force || /home/runner/.local/bin/zensical deploy --force
        fi