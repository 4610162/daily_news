name: Daily Economic Briefing

on:
  schedule:
    # 매일 한국 시간 오전 7시 (UTC 22시) 실행
    - cron: '0 22 * * *'
  workflow_dispatch:

# 아래 권한 설정이 있어야 Zensical이 페이지를 배포할 수 있습니다.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # 전체 히스토리를 가져와야 push 충돌이 적습니다.

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: python main.py
      
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. 원격 저장소의 최신 상태를 가져옵니다.
        git fetch origin master
        
        # 2. 강제로 원격 master와 동기화하되, 현재 main.py가 만든 파일들은 유지합니다.
        # pull --rebase 대신 아래 방식을 쓰면 'divergent branches' 에러를 피할 수 있습니다.
        git rebase origin/master || (git rebase --abort && git pull --no-rebase origin master --strategy-option=theirs)
        
        # 3. 변경된 파일들을 추가합니다.
        git add docs/ zensical.toml
        
        # 4. 변경사항이 있을 때만 커밋하고 푸시합니다.
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Update daily report and nav $(date +'%Y-%m-%d')"
          git push origin master
        else
          echo "No changes to commit"
        fi
        
# 마지막에 배포를 진행합니다.
    - name: Build and Deploy Zensical
      run: |
        zensical deploy --force